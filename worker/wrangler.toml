name = "naming-studio-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets / vars (set via wrangler, NOT committed):
#   npx wrangler secret put ANTHROPIC_API_KEY   # required: your Anthropic API key
#   (optional) [vars] ALLOWED_ORIGIN = "https://dimitri-frb.github.io"  # lock CORS

# Central request log (the /admin page → Central). Bound to a KV namespace.
[[kv_namespaces]]
binding = "LOG"
id = "6deae9f7e8774986ab1e38423de11394"

# (optional) protect the read endpoint with a key the /admin page must supply:
#   npx wrangler secret put ADMIN_KEY
