name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Set repo variable STUDIO_API_URL to your Worker URL to use real Claude.
          # Unset => the site runs on the built-in demo engine (current behaviour).
          VITE_NAMING_API: ${{ vars.STUDIO_API_URL }}
          VITE_STUDIO_API: ${{ vars.STUDIO_API_URL }}
          # Set repo variable GOOGLE_CLIENT_ID to a Google OAuth Web client id to
          # enable "Continue with Google" on the start gate. Unset => email only.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
